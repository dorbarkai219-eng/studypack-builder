name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly run to catch upstream breakage / new advisories.
  schedule:
    - cron: "0 5 * * 1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: install
        run: npm ci

      - name: audit (advisory, non-blocking)
        run: npm audit --omit=dev || true

      - name: lint
        run: npm run lint

      - name: test
        run: npm test

      - name: build
        run: npm run build
        env:
          # Build must work without an API key — /api/ingest is dynamic
          # and only calls Anthropic at request time.
          ANTHROPIC_API_KEY: ""
